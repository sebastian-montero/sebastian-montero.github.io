<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background: #000000;
            color: #ffffff;
        }

        .container {
            max-width: 650px;
            padding: 60px 20px;
            margin: 0;
        }

        .nav {
            display: flex;
            gap: 24px;
            margin-bottom: 60px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: -0.015rem;
            align-items: center;
        }

        .nav a {
            color: #000000;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .dark-mode .nav a {
            color: #ffffff;
        }

        .nav a:hover {
            opacity: 0.6;
        }

        .theme-toggle {
            margin-left: auto;
            background: none;
            border: 1px solid #000000;
            color: #000000;
            padding: 6px 12px;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: -0.015rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .dark-mode .theme-toggle {
            border-color: #ffffff;
            color: #ffffff;
        }

        .theme-toggle:hover {
            opacity: 0.6;
        }

        h1 {
            font-size: 40px;
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.16rem;
            margin-bottom: 32px;
            color: #000000;
        }

        .dark-mode h1 {
            color: #ffffff;
        }

        .content {
            max-width: 600px;
        }

        .content p {
            font-size: 14px;
            line-height: 1.5;
            letter-spacing: -0.0175rem;
            margin-bottom: 16px;
            color: #000000;
        }

        .dark-mode .content p {
            color: #ffffff;
        }

        .content strong {
            font-weight: 600;
        }

        .content a {
            color: #000000;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .dark-mode .content a {
            color: #ffffff;
        }

        .content a:hover {
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 28px;
                letter-spacing: -0.1rem;
                margin-bottom: 24px;
            }

            .nav {
                margin-bottom: 40px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            {{.Sidebar}}
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <span class="light-mode-text">Dark</span>
                <span class="dark-mode-text" style="display: none;">Light</span>
            </button>
        </div>

        <h1>Sebastian Montero</h1>

        <div class="content">
            {{.Content}}
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const lightModeText = document.querySelector('.light-mode-text');
        const darkModeText = document.querySelector('.dark-mode-text');

        // Check for saved theme preference or default to light mode
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            lightModeText.style.display = 'none';
            darkModeText.style.display = 'inline';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                lightModeText.style.display = 'none';
                darkModeText.style.display = 'inline';
            } else {
                localStorage.setItem('theme', 'light');
                lightModeText.style.display = 'inline';
                darkModeText.style.display = 'none';
            }
        });
    </script>
</body>
</html>
