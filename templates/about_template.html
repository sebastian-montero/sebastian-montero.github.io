<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 650px;
            padding: 60px 20px;
            margin: 0;
        }

        .nav {
            display: flex;
            gap: 24px;
            margin-bottom: 60px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: -0.015rem;
        }

        .nav a {
            color: #000000;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .nav a:hover {
            opacity: 0.6;
        }

        h1 {
            font-size: 40px;
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.16rem;
            margin-bottom: 32px;
            color: #000000;
        }

        .content {
            max-width: 600px;
        }

        .content p {
            font-size: 14px;
            line-height: 1.5;
            letter-spacing: -0.0175rem;
            margin-bottom: 16px;
            color: #000000;
        }

        .content strong {
            font-weight: 600;
        }

        .content a {
            color: #000000;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .content a:hover {
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 28px;
                letter-spacing: -0.1rem;
                margin-bottom: 24px;
            }

            .nav {
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            {{.Sidebar}}
        </div>

        <h1>Sebastian Montero</h1>

        <div class="content">
            {{.Content}}
        </div>
    </div>
</body>
</html>
